<!DOCTYPE html>
<html>
<head>
  <title>Resume Preview</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #eef2f7;
      padding: 30px;
    }

    .resume {
      max-width: 900px;
      margin: auto;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    h1, h2, h3 {
      margin-bottom: 8px;
    }

    p {
      margin: 5px 0;
      color: #555;
    }

    hr {
      border: none;
      border-top: 1px solid #ddd;
      margin: 15px 0;
    }

    /* ===== TEMPLATE 1 (Clean Elegant) ===== */
    .simple {
      padding: 30px;
      text-align: center;
    }

    .simple h1 {
      font-size: 28px;
      color: #222;
    }

    .simple .info {
      margin-top: 10px;
      color: #777;
    }

    /* ===== TEMPLATE 2 (Modern Sidebar) ===== */
    .modern {
      display: flex;
    }

    .modern .left {
      width: 30%;
      background: linear-gradient(135deg, #2c3e50, #34495e);
      color: white;
      padding: 25px;
    }

    .modern .left h2 {
      margin-bottom: 10px;
    }

    .modern .right {
      width: 70%;
      padding: 25px;
    }

    .section-title {
      margin-top: 15px;
      font-weight: bold;
      color: #007bff;
    }

    /* ===== TEMPLATE 3 (Corporate Professional) ===== */
    .professional {
      padding: 30px;
${data.photo ? `<img src="${data.photo}" style="width:100px;border-radius:50%;">` : ""}
    }

    .professional h1 {
      color: #007bff;
      border-bottom: 3px solid #007bff;
      display: inline-block;
      padding-bottom: 5px;
    }

    .professional .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

  </style>
</head>

<body>

<div id="resumeBox"></div>

<script>
let user = localStorage.getItem("loggedInUser");
let data = JSON.parse(localStorage.getItem("resume_" + user));

if (!data) {
  document.getElementById("resumeBox").innerHTML = "No resume found!";
} else {

  let template = data.template;

  // ===== TEMPLATE 1 =====
  if (template === "template1") {
    document.getElementById("resumeBox").innerHTML = `
      <div class="resume simple">
        <h1>${data.firstName} ${data.lastName}</h1>
        <div class="info">
          ${data.profession} • ${data.email} • ${data.phone}
        </div>

        <hr>

        <h3>Profile</h3>
        <p>${data.profession} with strong dedication and passion.</p>

        <h3>Address</h3>
        <p>${data.address}, ${data.city}, ${data.state}</p>
      </div>
    `;
  }

  // ===== TEMPLATE 2 =====
  else if (template === "template2") {
    document.getElementById("resumeBox").innerHTML = `
      <div class="resume modern">

        <div class="left">
          <h2>${data.firstName}</h2>
          <p>${data.profession}</p>

          <div class="section-title">Contact</div>
          <p>${data.phone}</p>
          <p>${data.email}</p>

          <div class="section-title">Nationality</div>
          <p>${data.nationality}</p>
        </div>

        <div class="right">
          <h1>${data.firstName} ${data.lastName}</h1>

          <div class="section-title">Profile</div>
          <p>Motivated individual with strong skills and adaptability.</p>

          <div class="section-title">Location</div>
          <p>${data.address}, ${data.city}</p>

          <div class="section-title">Additional Info</div>
          <p>Marital Status: ${data.maritalStatus || "N/A"}</p>
          <p>DOB: ${data.dob || "N/A"}</p>
        </div>

      </div>
    `;
  }

  // ===== TEMPLATE 3 =====
  else {
    document.getElementById("resumeBox").innerHTML = `
      <div class="resume professional">

        <div class="top">
          <div>
            <h1>${data.firstName} ${data.lastName}</h1>
            <p>${data.profession}</p>
          </div>
          <div>
            <p>${data.email}</p>
            <p>${data.phone}</p>
          </div>
        </div>

        <hr>

        <h3>Address</h3>
        <p>${data.address}, ${data.city}, ${data.state}</p>

        <h3>Nationality</h3>
        <p>${data.nationality}</p>

        <h3>Profile</h3>
        <p>Dedicated professional with strong work ethic and adaptability.</p>

      </div>
    `;
  }

}
</script>

</body>
</html>
