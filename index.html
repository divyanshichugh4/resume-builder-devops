<!-- TOGGLE BUTTONS -->
<div class="toggle-buttons">
    <button type="button" id="loginBtn" class="active" onclick="showLogin()">Login</button>
    <button type="button" id="signupBtn" onclick="showSignup()">Sign Up</button>
</div>

<!-- LOGIN FORM -->
<div id="loginForm">
    <input type="text" id="loginUser" placeholder="Username">
    <input type="password" id="loginPass" placeholder="Password">
    <button type="button" class="submit-btn" onclick="login()">Login</button>
</div>

<!-- SIGNUP FORM -->
<div id="signupForm" style="display:none;">
    <input type="text" id="signupUser" placeholder="Create Username">
    <input type="password" id="signupPass" placeholder="Create Password">
    <button type="button" class="submit-btn" onclick="signup()">Sign Up</button>
</div>
