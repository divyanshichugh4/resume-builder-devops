<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Builder Form</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
  }
  .notice {
    background-color: #00bfff; /* Light blue background */
    color: white;
    padding: 10px;
    text-align: center;
    margin-bottom: 20px;
    font-weight: bold;
  }
  form {
    max-width: 900px;
    margin: auto;
  }
  .form-group {
    display: flex;
    flex-direction: column;
    margin-bottom: 15px;
  }
  label {
    font-weight: bold;
    margin-bottom: 5px;
  }
  input[type="text"], input[type="date"], select {
    padding: 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
  }
  .row {
    display: flex;
    gap: 20px;
  }
  .row .form-group {
    flex: 1;
  }
  .submit-btn {
    background-color: #28a745; /* Green */
    color: white;
    padding: 10px 20px;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    font-size: 16px;
    float: right;
  }
</style>
</head>
<body>

<div class="notice">
  We suggest including an email and phone number.
</div>

<form>
  <div class="row">
    <div class="form-group">
      <label for="firstName">First Name</label>
      <input type="text" id="firstName" name="firstName" placeholder="First Name" />
    </div>
    <div class="form-group">
      <label for="middleName">Middle Name (Optional)</label>
      <input type="text" id="middleName" name="middleName" placeholder="Middle Name" />
    </div>
    <div class="form-group">
      <label for="lastName">Last Name</label>
      <input type="text" id="lastName" name="lastName" placeholder="Last Name" />
    </div>
  </div>

  <div class="row">
    <div class="form-group">
      <label for="gender">Gender (Optional)</label>
      <select id="gender" name="gender">
        <option value="">Select</option>
        <option value="male">Male</option>
        <option value="female">Female</option>
        <option value="other">Other</option>
      </select>
    </div>
    <div class="form-group">
      <label for="dob">Date of Birth (Optional)</label>
      <input type="date" id="dob" name="dob" />
    </div>
    <div class="form-group">
      <label for="maritalStatus">Marital Status (Optional)</label>
      <select id="maritalStatus" name="maritalStatus">
        <option value="">Select</option>
        <option value="single">Single</option>
        <option value="married">Married</option>
        <option value="divorced">Divorced</option>
      </select>
    </div>
  </div>

  <div class="row">
    <div class="form-group">
      <label for="profession">Profession</label>
      <input type="text" id="profession" name="profession" placeholder="e.g. Sr. Accountant" />
    </div>
    <div class="form-group">
      <label for="streetAddress">Street Address</label>
      <input type="text" id="streetAddress" name="streetAddress" placeholder="Street Address" />
    </div>
  </div>

  <div class="row">
    <div class="form-group">
      <label for="city">City</label>
      <input type="text" id="city" name="city" placeholder="City" />
    </div>
    <div class="form-group">
      <label for="state">State/Province</label>
      <input type="text" id="state" name="state" placeholder="State/Province" />
    </div>
    <div class="form-group">
      <label for="nationality">Nationality (Optional)</label>
      <select id="nationality" name="nationality">
        <option value="">Select Country</option>
        <!-- Add country options here -->
      </select>
    </div>
  </div>

  <div class="row">
    <div class="form-group">
      <label for="passport">Passport Number (Optional)</label>
      <input type="text" id="passport" name="passport" placeholder="Passport Number" />
    </div>
    <div class="form-group">
      <label for="phone">Phone</label>
      <input type="text" id="phone" name="phone" placeholder="Phone" />
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="text" id="email" name="email" placeholder="Email" />
    </div>
  </div>

  <button type="submit" class="submit-btn">Save</button>
</form>

</body>
</html>
