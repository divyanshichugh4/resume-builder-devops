<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume Builder</title>
  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      /* Gradient background matching your theme */
      background: linear-gradient(135deg, #ff4d4d, #ffe6e6);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background-color: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      max-width: 400px;
      width: 100%;
      text-align: center;
    }

    h1 {
      color: #c00;
      /* dark red */
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 5px;
      font-size: 1em;
      cursor: pointer;
      font-weight: bold;
    }

    /* Red button style */
    .btn-red {
      background-color: #c00;
      color: #fff;
    }

    /* Gray button style for Sign Up */
    .btn-gray {
      background-color: #eee;
      color: #333;
    }

    /* Input styles */
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      margin-bottom: 16px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    /* Link style for Sign Up button to look like a button */
    .link-button {
      display: inline-block;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Resume Builder</h1>
    <button class="btn-red" onclick="showLogin()">Login</button>
    <button class="btn-gray" onclick="showSignUp()">Sign Up</button>

    <div id="login-form" style="display:none; margin-top:20px;">
      <input type="text" placeholder="Username" id="login-username" />
      <input type="password" placeholder="Password" id="login-password" />
      <div style="text-align: right; margin-top: -10px; margin-bottom: 10px;">
        <a href="#" onclick="showForgotPassword()" style="font-size: 0.85em; color: #c00; text-decoration: none;">Forgot
          Password?</a>
      </div>
      <button class="btn-red" onclick="handleLogin()">Login</button>

      <div style="margin: 15px 0; color: #666;">or</div>

      <!-- Google Sign-In config and button -->
      <!-- YOU MUST REPLACE data-client_id WITH YOUR ACTUAL GOOGLE CLIENT ID -->
      <div id="g_id_onload" data-client_id="1016595135927-hhrisfu8j05llfvsl0n2cjbr8b7cqp43.apps.googleusercontent.com"
        data-context="signin" data-ux_mode="popup" data-callback="handleCredentialResponse" data-auto_prompt="false">
      </div>

      <div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="outline"
        data-text="signin_with" data-size="large" data-logo_alignment="left"
        style="display: flex; justify-content: center;">
      </div>
    </div>

    <div id="signup-form" style="display:none; margin-top:20px;">
      <input type="text" placeholder="Username" id="signup-username" />
      <input type="password" placeholder="Password" id="signup-password" />
      <button class="btn-red" onclick="handleSignUp()">Sign Up</button>
    </div>

    <div id="forgot-password-form" style="display:none; margin-top:20px;">
      <input type="text" placeholder="Username" id="forgot-username" />
      <input type="password" placeholder="New Password" id="forgot-password" />
      <button class="btn-red" onclick="handleResetPassword()">Reset Password</button>
      <button class="btn-gray" onclick="showLogin()">Back to Login</button>
    </div>
  </div>

  <script>
    async function handleCredentialResponse(response) {
      try {
        const apiBaseUrl = window.location.protocol === 'file:' ? 'http://localhost:3000' : '';
        const res = await fetch(apiBaseUrl + '/api/google-login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ credential: response.credential })
        });

        const data = await res.json();

        if (res.ok) {
          alert("Google Login successful!");
          localStorage.setItem("loggedInUser", data.username);
          window.location.href = "dashboard.html";
        } else {
          alert("Google Login failed: " + (data.error || 'Unknown error'));
        }
      } catch (err) {
        alert("Server error! Details: " + err.message);
      }
    }

    function showLogin() {
      document.getElementById('login-form').style.display = 'block';
      document.getElementById('signup-form').style.display = 'none';
      document.getElementById('forgot-password-form').style.display = 'none';
    }

    function showSignUp() {
      document.getElementById('signup-form').style.display = 'block';
      document.getElementById('login-form').style.display = 'none';
      document.getElementById('forgot-password-form').style.display = 'none';
    }

    function showForgotPassword() {
      document.getElementById('login-form').style.display = 'none';
      document.getElementById('signup-form').style.display = 'none';
      document.getElementById('forgot-password-form').style.display = 'block';
    }

    async function handleLogin() {
      let user = document.getElementById("login-username").value;
      let pass = document.getElementById("login-password").value;

      try {
        const apiBaseUrl = window.location.protocol === 'file:' ? 'http://localhost:3000' : '';
        const response = await fetch(apiBaseUrl + '/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: user, password: pass })
        });

        if (response.ok) {
          alert("Login successful!");
          localStorage.setItem("loggedInUser", user);
          window.location.href = "dashboard.html";
        } else {
          alert("Invalid credentials!");
        }
      } catch (err) {
        alert("Server error! Please ensure you have started the backend server (node server.js). Details: " + err.message);
      }
    }

    async function handleSignUp() {
      let user = document.getElementById("signup-username").value;
      let pass = document.getElementById("signup-password").value;

      if (user && pass) {
        if (user.length < 8) {
          alert("Username must be at least 8 characters long.");
          return;
        }
        if (!/^[a-zA-Z0-9_]+$/.test(user)) {
          alert("Username can only contain letters, numbers, and underscores.");
          return;
        }
        try {
          const apiBaseUrl = window.location.protocol === 'file:' ? 'http://localhost:3000' : '';
          const response = await fetch(apiBaseUrl + '/api/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: user, password: pass })
          });
          const data = await response.json();

          if (response.ok) {
            alert("Account created! Now login.");
            showLogin();
          } else {
            alert("Error: " + data.error);
          }
        } catch (err) {
          alert("Server error! Please ensure you have started the backend server (node server.js). Details: " + err.message);
        }
      } else {
        alert("Please fill all fields");
      }
    }

    async function handleResetPassword() {
      let user = document.getElementById("forgot-username").value;
      let newPass = document.getElementById("forgot-password").value;

      if (user && newPass) {
        try {
          const response = await fetch('/api/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: user, newPassword: newPass })
          });
          const data = await response.json();

          if (response.ok) {
            alert("Password reset successfully! Now login.");
            showLogin();
          } else {
            alert("Error: " + data.error);
          }
        } catch (err) {
          alert("Server error!");
        }
      } else {
        alert("Please fill all fields");
      }
    }
  </script>

</body>

</html>
