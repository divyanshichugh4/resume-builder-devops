<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Resume Result - My CV Creator</title>
<style>
  /* Reset some default styles */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Arial', sans-serif;
    background-color: #f4f6f8;
    color: #333;
    padding: 20px;
  }

  /* Container for the resume */
.resume-container {
    max-width: 800px;
    margin: 0 auto;
    background-color: #fff;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }

  /* Header */
.resume-header {
    text-align: center;
    margin-bottom: 30px;
  }

  .resume-header h1 {
    font-size: 2em;
    color: #4a4a4a;
  }

  /* Sections */
.section {
    margin-bottom: 20px;
  }

  .section h2 {
    font-size: 1.5em;
    margin-bottom: 10px;
    color: #007bff;
  }

  /* Content styles */
.content {
    padding-left: 15px;
}

.profile, .experience, .education, .skills {
    margin-bottom: 15px;
}

.item {
    margin-bottom: 10px;
}

.item h3 {
    font-size: 1.2em;
    margin-bottom: 5px;
    color: #333;
}

.item p {
    font-size: 1em;
    color: #555;
}

/* Buttons */
.btn {
    display: inline-block;
    padding: 10px 20px;
    background-color: #007bff;
    color: #fff;
    border-radius: 8px;
    text-decoration: none;
    cursor: pointer;
    margin-top: 20px;
    transition: background-color 0.2s;
}

.btn:hover {
    background-color: #0056b3;
}

@media(max-width: 768px) {
    body {
        padding: 10px;
    }
}
<div class="resume-container">
    <div class="resume-header">
        <h1 id="rName"></h1>
        <p id="rEmail"></p>
        <p id="rPhone"></p>
    </div>

    <div class="section">
        <h2>Skills</h2>
        <div id="rSkills"></div>
    </div>
</div>

<script>
    document.getElementById("rName").innerText = localStorage.getItem("name");
    document.getElementById("rEmail").innerText = localStorage.getItem("email");
    document.getElementById("rPhone").innerText = localStorage.getItem("phone");

    let skills = localStorage.getItem("skills").split(",");
    let skillHTML = "<ul>";

    skills.forEach(s => {
        skillHTML += `<li>${s}</li>`;
    });

    skillHTML += "</ul>";

    document.getElementById("rSkills").innerHTML = skillHTML;
</script>
</style>
</head>
<body>
