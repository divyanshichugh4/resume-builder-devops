<!DOCTYPE html>
<html>
<head>
  <title>Resume Preview</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #eef2f7;
      padding: 30px;
    }

    .resume {
      max-width: 900px;
      margin: auto;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    h1, h2, h3 {
      margin-bottom: 8px;
    }

    p {
      margin: 5px 0;
      color: #555;
    }

    hr {
      border: none;
      border-top: 1px solid #ddd;
      margin: 15px 0;
    }

    /* ===== TEMPLATE 1 (Clean Elegant) ===== */
    .simple {
      padding: 30px;
      text-align: center;
    }

    .simple h1 {
      font-size: 28px;
      color: #222;
    }

    .simple .info {
      margin-top: 10px;
      color: #777;
    }

    /* ===== TEMPLATE 2 (Modern Sidebar) ===== */
    .modern {
      display: flex;
    }

    .modern .left {
      width: 30%;
      background: linear-gradient(135deg, #2c3e50, #34495e);
      color: white;
      padding: 25px;
    }

    .modern .left h2 {
      margin-bottom: 10px;
    }

    .modern .right {
      width: 70%;
      padding: 25px;
    }

    .section-title {
      margin-top: 15px;
      font-weight: bold;
      color: #007bff;
    }

    /* ===== TEMPLATE 3 (Corporate Professional) ===== */
    .professional {
      display: flex;
      padding: 0;
      color: #333;
      border-radius: 0;
    }

    .professional .left {
      width: 35%;
      background-color: #28323c;
      color: #fff;
      padding: 40px 20px;
      text-align: center;
    }

    .professional .left h1 {
      color: #fff;
      font-size: 24px;
      margin-top: 15px;
      margin-bottom: 5px;
      border: none;
      padding-bottom: 0;
    }

    .professional .left .profession-title {
      color: #6c98c6;
      font-size: 16px;
      margin-bottom: 30px;
    }

    .professional .left .photo-container {
      width: 150px;
      height: 150px;
      margin: 0 auto 20px;
      border-radius: 50%;
      border: 3px solid #6c98c6;
      overflow: hidden;
      background: #eee;
    }
    .professional .left .photo-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .professional .left .section {
      text-align: left;
      margin-top: 30px;
    }

    .professional .left .section h3 {
      font-size: 18px;
      border-bottom: 2px solid #555;
      padding-bottom: 5px;
      margin-bottom: 15px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .professional .left .info-item {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .professional .left ul {
      list-style-type: circle;
      padding-left: 20px;
      font-size: 14px;
    }
    .professional .left ul li {
      margin-bottom: 8px;
    }

    .professional .right {
      width: 65%;
      background-color: #fff;
      padding: 40px;
    }

    .professional .right h2 {
      font-size: 22px;
      color: #222;
      border-bottom: 2px solid #ddd;
      padding-bottom: 5px;
      margin-bottom: 15px;
      margin-top: 30px;
      text-transform: uppercase;
    }

    .professional .right h2:first-child {
      margin-top: 0;
    }

    .professional .right p {
      font-size: 14px;
      line-height: 1.6;
    }

    .professional .right .job, .professional .right .degree {
      margin-top: 20px;
    }
    .professional .right .job-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 5px;
    }
    .professional .right .job-title {
      font-weight: bold;
      font-size: 16px;
      color: #111;
    }
    .professional .right .job-company {
      font-style: italic;
      color: #555;
      font-size: 14px;
    }
    .professional .right .job-date {
      font-size: 13px;
      color: #777;
    }
    .professional .right ul {
      margin-top: 10px;
      padding-left: 20px;
      font-size: 14px;
      line-height: 1.6;
    }

    @media print {
      body {
        background: #fff;
        padding: 0;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .resume {
        box-shadow: none;
        margin: 0;
        max-width: 100% !important;
        border-radius: 0;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .controls {
        display: none !important;
      }
    }
  </style>
</head>

<body>

<div class="controls" style="text-align: center; margin-bottom: 20px;">
  <button onclick="window.print()" style="padding: 12px 24px; font-size:16px; font-weight:bold; background-color:#28a745; color:white; border:none; border-radius:5px; cursor:pointer; box-shadow:0 4px 6px rgba(0,0,0,0.1);">
    📥 Download as PDF
  </button>
  <button onclick="window.location.href='dashboard.html'" style="padding: 12px 24px; font-size:16px; font-weight:bold; background-color:#6c757d; color:white; border:none; border-radius:5px; cursor:pointer; margin-left:10px; box-shadow:0 4px 6px rgba(0,0,0,0.1);">
    Back to Dashboard
  </button>
</div>

<div id="resumeBox"></div>

<script>
(async function() {
let user = localStorage.getItem("loggedInUser");

if (!user) {
  document.getElementById("resumeBox").innerHTML = "Please login first!";
  return;
}

let data;
try {
  let res = await fetch('/api/resumes/' + user);
  let result = await res.json();
  if(result.success && result.resume) {
      data = result.resume;
  } else {
      data = JSON.parse(localStorage.getItem("resume_" + user));
  }
} catch(err) {
  console.warn("Backend unreachable. Loading local backup...");
  data = JSON.parse(localStorage.getItem("resume_" + user));
}

if (!data) {
  document.getElementById("resumeBox").innerHTML = "No resume found!";
} else {

  let template = data.template;

  // ===== TEMPLATE 1 =====
  if (template === "template1") {
    document.getElementById("resumeBox").innerHTML = `
      <div class="resume simple">
        <h1>${data.firstName} ${data.lastName}</h1>
        <div class="info">
          ${data.profession} • ${data.email} • ${data.phone}
        </div>

        <hr>

        <h3>Profile</h3>
        <p>${data.profession} with strong dedication and passion.</p>

        <h3>Address</h3>
        <p>${data.address}, ${data.city}, ${data.state}</p>
      </div>
    `;
  }

  // ===== TEMPLATE 2 =====
  else if (template === "template2") {
    document.getElementById("resumeBox").innerHTML = `
      <div class="resume modern">

        <div class="left">
          <h2>${data.firstName}</h2>
          <p>${data.profession}</p>

          <div class="section-title">Contact</div>
          <p>${data.phone}</p>
          <p>${data.email}</p>

          <div class="section-title">Nationality</div>
          <p>${data.nationality}</p>
        </div>

        <div class="right">
          <h1>${data.firstName} ${data.lastName}</h1>

          <div class="section-title">Profile</div>
          <p>Motivated individual with strong skills and adaptability.</p>

          <div class="section-title">Location</div>
          <p>${data.address}, ${data.city}</p>

          <div class="section-title">Additional Info</div>
          <p>Marital Status: ${data.maritalStatus || "N/A"}</p>
          <p>DOB: ${data.dob || "N/A"}</p>
        </div>

      </div>
    `;
  }

  // ===== TEMPLATE 3 =====
  else {
    const listMaker = (str) => str ? str.split(',').filter(s=>s.trim()).map(s => `<li>${s.trim()}</li>`).join('') : '<li>Not provided</li>';
    const descMaker = (str) => str ? str.split('\\n').filter(s=>s.trim()).map(s => `<li>${s.trim()}</li>`).join('') : '<li>No description provided.</li>';

    document.getElementById("resumeBox").innerHTML = `
      <div class="resume professional">
        <div class="left">
          ${data.photo ? `
          <div class="photo-container">
            <img src="${data.photo}">
          </div>
          ` : `
          <div class="photo-container" style="display:flex;align-items:center;justify-content:center;font-size:40px;color:#ccc;background:#3a4652">
             &#128100;
          </div>
          `}
          <h1>${data.firstName || 'Your Name'} ${data.lastName || ''}</h1>
          <div class="profession-title">${data.profession || 'Professional'}</div>

          <div class="section">
            <h3>Contact</h3>
            <div class="info-item">📞 ${data.phone || 'N/A'}</div>
            <div class="info-item">✉️ ${data.email || 'N/A'}</div>
            <div class="info-item">📍 ${data.address || ''}, ${data.city || 'N/A'}</div>
          </div>

          <div class="section">
            <h3>Skills</h3>
            <ul>
              ${listMaker(data.skills || '')}
            </ul>
          </div>
          
          <div class="section">
            <h3>Languages</h3>
            <ul>
              ${listMaker(data.languages || '')}
            </ul>
          </div>

          <div class="section">
            <h3>Hobbies</h3>
            <ul>
               ${listMaker(data.hobbies || '')}
            </ul>
          </div>
        </div>

        <div class="right">
          <h2>Profile</h2>
          <p>${data.profileSummary || ''}</p>

          <h2>Work Experience</h2>
          <div class="job">
            <div class="job-header">
              <div>
                <div class="job-title">${data.jobTitle || 'Job Title'}</div>
                <div class="job-company">${data.jobCompany || 'Company – Location'}</div>
              </div>
              <div class="job-date">${data.jobDates || 'Dates'}</div>
            </div>
            <ul>
              ${descMaker(data.jobDesc || '')}
            </ul>
          </div>

          <h2>Education</h2>
          <div class="job">
            <div class="job-header">
              <div>
                <div class="job-title">${data.eduDegree || 'Degree'}</div>
                <div class="job-company">${data.eduSchool || 'University/School'}</div>
              </div>
              <div class="job-date">${data.eduDates || 'Dates'}</div>
            </div>
          </div>

        </div>
      </div>
    `;
  }

}

})();
</script>

</body>
</html>
